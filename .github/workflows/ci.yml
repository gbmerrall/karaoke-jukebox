name: CI

# Fast checks on every push and PR. Runs the unit suite only - the live yt-dlp
# canary is skipped by default, so no secrets or network access are required.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        # uv reads .python-version (3.13) and provisions the interpreter; uv.lock
        # pins everything for a reproducible install. Includes the dev group.
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Run fast tests
        run: uv run pytest
