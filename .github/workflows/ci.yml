name: CI

# Fast checks on every push and PR. Runs the unit suite only - the live yt-dlp
# canary is skipped by default, so no secrets or network access are required.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Lint
        run: pipenv run ruff check .

      - name: Run fast tests
        run: pipenv run pytest
