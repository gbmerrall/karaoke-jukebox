version: '3.8'

services:
  jukebox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: karaoke-jukebox

    # Load non-secret defaults and any overrides from .env
    env_file: .env

    # NOTE: No volumes configured - database and videos are ephemeral
    # All data (queue, downloaded videos) will be lost on container restart
    # Uncomment below to persist data:
    # volumes:
    #   - ./data:/app/data

    environment:
      # REQUIRED secrets - compose FAILS LOUDLY if any are unset in .env rather
      # than booting with a known-public placeholder password.
      # Generate SECRET_KEY (min 32 chars) with:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:?YOUTUBE_API_KEY must be set in .env}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}

      # REQUIRED for Chromecast: Set to your Docker host's IP address
      # Find with: ip addr show (Linux) or ifconfig (macOS)
      # DO NOT use localhost or 127.0.0.1
      - SERVER_HOST=${SERVER_HOST:?SERVER_HOST must be set in .env}

      # Optional: Adjust if needed
      - SERVER_PORT=8000
      - DATA_DIR=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    restart: unless-stopped

    # Host networking is REQUIRED for Chromecast discovery: pychromecast relies
    # on mDNS (UDP 5353) multicast, which does not traverse Docker's default
    # bridge network. With host mode the container shares the host's network
    # stack and can both discover casts and serve video URLs they can reach.
    network_mode: host
